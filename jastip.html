<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzamar Jastip - Jasa Titip Terpercaya</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sky: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-sky-50 min-h-screen flex flex-col text-slate-800">

    <!-- Header / Navbar -->
    <header class="bg-sky-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-5 py-4 flex items-center justify-start">
            <div class="flex items-center gap-2">
                <i data-lucide="shopping-bag" class="w-6 h-6 md:w-7 md:h-7"></i>
                <h1 class="text-xl md:text-2xl font-bold tracking-wide">Dzamar Jastip</h1>
            </div>
        </div>
    </header>

    <!-- Main Content Wrapper -->
    <div class="w-full max-w-2xl mx-auto flex flex-col flex-grow">

        <!-- Hero Section -->
        <section class="px-5 py-8 md:py-10 text-center bg-white md:rounded-b-3xl shadow-sm mb-6">
            <div class="w-16 h-16 bg-sky-100 rounded-full flex items-center justify-center mx-auto mb-4 text-sky-500">
                <i data-lucide="truck" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl md:text-3xl font-bold text-sky-900 mb-2">Pesan Barang Mager?</h2>
            <p class="text-sm md:text-base text-slate-600 leading-relaxed max-w-md mx-auto">
                Biar kami yang urus! Isi detail pesananmu di bawah, otomatis terkirim via WhatsApp.
            </p>
        </section>

        <!-- Main Form Section -->
        <main class="flex-grow px-4 md:px-0 pb-8">
            <div id="form-pesanan" class="bg-white rounded-2xl shadow-sm border border-sky-100 w-full overflow-hidden">
                <div class="bg-sky-500 px-5 py-3 flex items-center gap-2 text-white">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                    <h3 class="text-base font-semibold">Formulir Jastip</h3>
                </div>
                
                <form id="jastipForm" class="p-5 space-y-5" onsubmit="sendToWhatsApp(event)">
                    
                    <!-- Nama Pemesan -->
                    <div>
                        <label for="namaPemesan" class="block text-xs font-semibold text-slate-700 mb-1">Nama Anda *</label>
                        <input type="text" id="namaPemesan" required placeholder="Nama panggilan/lengkap" 
                            class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
                    </div>

                    <!-- Nama Barang -->
                    <div>
                        <label for="namaBarang" class="block text-xs font-semibold text-slate-700 mb-1">Nama Barang *</label>
                        <input type="text" id="namaBarang" required placeholder="Contoh: Sepatu Converse Hitam 42" 
                            class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
                    </div>

                    <!-- Foto Barang -->
                    <div>
                        <label for="fotoBarang" class="block text-xs font-semibold text-slate-700 mb-1">Referensi Foto</label>
                        <div class="flex items-center justify-center w-full">
                            <label for="fotoBarang" class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-300 border-dashed rounded-lg cursor-pointer bg-slate-50 hover:bg-sky-50 hover:border-sky-400 transition-all">
                                <div class="flex flex-col items-center justify-center pt-3 pb-4 text-slate-500" id="upload-placeholder">
                                    <i data-lucide="image-plus" class="w-6 h-6 mb-1 text-sky-500"></i>
                                    <p class="text-xs"><span class="font-semibold text-sky-600">Klik upload</span> foto</p>
                                </div>
                                <div class="hidden flex-col items-center justify-center text-sky-700" id="upload-success">
                                    <i data-lucide="check-circle" class="w-6 h-6 mb-1 text-green-500"></i>
                                    <p class="text-xs font-medium truncate w-48 text-center" id="file-name">Foto dipilih</p>
                                </div>
                                <input id="fotoBarang" type="file" accept="image/*" class="hidden" onchange="handleFileUpload(this)" />
                            </label>
                        </div>
                        <p class="text-[10px] text-amber-600 mt-1.5 leading-tight flex items-start gap-1">
                            <i data-lucide="info" class="w-3 h-3 shrink-0"></i>
                            <span>Kirimkan foto secara manual di WhatsApp setelah menekan tombol kirim.</span>
                        </p>
                    </div>

                    <!-- Metode Pembayaran -->
                    <div>
                        <label for="pembayaran" class="block text-xs font-semibold text-slate-700 mb-1">Metode Pembayaran *</label>
                        <div class="relative">
                            <select id="pembayaran" required class="w-full appearance-none px-3 py-2.5 text-sm rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all bg-white">
                                <option value="" disabled selected>Pilih metode</option>
                                <optgroup label="Transfer Bank">
                                    <option value="BCA">BCA</option>
                                    <option value="Mandiri">Mandiri</option>
                                    <option value="BNI">BNI</option>
                                    <option value="BRI">BRI</option>
                                </optgroup>
                                <optgroup label="E-Wallet">
                                    <option value="GoPay">GoPay</option>
                                    <option value="OVO">OVO</option>
                                    <option value="DANA">DANA</option>
                                    <option value="ShopeePay">ShopeePay</option>
                                </optgroup>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-3 top-3 w-4 h-4 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>

                    <!-- Catatan (Opsional) -->
                    <div>
                        <label for="catatan" class="block text-xs font-semibold text-slate-700 mb-1">Catatan (Opsional)</label>
                        <textarea id="catatan" rows="2" placeholder="Warna, ukuran alternatif..." 
                            class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all resize-none"></textarea>
                    </div>

                    <!-- Submit Button -->
                <button type="submit" class="w-full bg-[#25D366] hover:bg-[#1ebd5b] text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2 text-sm md:text-base mt-4">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    Kirim via WhatsApp
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-sky-900 text-sky-200 py-6 text-center mt-auto md:rounded-t-3xl">
        <p class="text-xs md:text-sm">
            &copy; 2026 Dzamar Jastip. All rights reserved.
        </p>
    </footer>

    </div>

<!-- JavaScript Logic -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Handle File Upload Display
        function handleFileUpload(input) {
            const placeholder = document.getElementById('upload-placeholder');
            const success = document.getElementById('upload-success');
            const fileNameDisplay = document.getElementById('file-name');

            if (input.files && input.files[0]) {
                placeholder.classList.add('hidden');
                success.classList.remove('hidden');
                success.classList.add('flex');
                
                // Truncate file name if too long
                let fileName = input.files[0].name;
                if(fileName.length > 25) {
                    fileName = fileName.substring(0, 22) + '...';
                }
                fileNameDisplay.textContent = fileName;
            } else {
                placeholder.classList.remove('hidden');
                success.classList.add('hidden');
                success.classList.remove('flex');
            }
        }

        // Handle Form Submission to WhatsApp
        function sendToWhatsApp(event) {
            event.preventDefault(); // Mencegah reload halaman

            // GANTI NOMOR INI DENGAN NOMOR WA DZAMAR JASTIP (Gunakan kode negara 62)
            const nomorWhatsApp = "6281234567890"; 

            // Mengambil nilai dari form
            const nama = document.getElementById('namaPemesan').value.trim();
            const barang = document.getElementById('namaBarang').value.trim();
            const pembayaran = document.getElementById('pembayaran').value;
            const catatan = document.getElementById('catatan').value.trim() || "-";
            
            // Cek file foto
            const fotoInput = document.getElementById('fotoBarang');
            let infoFoto = "Tidak ada lampiran foto";
            if (fotoInput.files.length > 0) {
                infoFoto = `Ada foto referensi (*${fotoInput.files[0].name}*). Saya akan kirimkan fotonya di chat ini ya!`;
            }

            // Menyusun format pesan
            const pesan = `Halo *Dzamar Jastip*, saya ingin menggunakan jasa titip:

🛍️ *Detail Pesanan*
* Nama Pemesan : ${nama}
* Nama Barang : ${barang}
* Pembayaran via : ${pembayaran}

📝 *Catatan Tambahan*
${catatan}

📸 *Status Foto*
${infoFoto}

Mohon dibantu ya. Terima kasih!`;

            // Membuat link WhatsApp dan redirect
            const urlWhatsApp = `https://wa.me/${nomorWhatsApp}?text=${encodeURIComponent(pesan)}`;
            
            // Membuka di tab baru
            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>
